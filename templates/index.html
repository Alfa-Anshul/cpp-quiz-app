<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Quiz Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <div class="logo">C++ QUIZ</div>
            <h1>Master C++ Programming</h1>
            <p>Test your knowledge with our interactive quiz</p>
            <div class="difficulty-selector">
                <button class="btn" onclick="startQuiz('beginner')">Beginner</button>
                <button class="btn" onclick="startQuiz('intermediate')">Intermediate</button>
                <button class="btn" onclick="startQuiz('advanced')">Advanced</button>
            </div>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="progress-bar">
                    <div id="progress" class="progress-fill"></div>
                </div>
                <div class="quiz-info">
                    <span id="question-number"></span>
                    <span id="score"></span>
                </div>
            </div>

            <div class="quiz-content">
                <h2 id="question-text"></h2>
                <div id="options" class="options-container"></div>
            </div>

            <div class="quiz-footer">
                <button id="prev-btn" class="btn-nav" onclick="previousQuestion()">← Previous</button>
                <button id="next-btn" class="btn-nav" onclick="nextQuestion()">Next →</button>
            </div>
        </div>

        <div id="results-screen" class="screen">
            <div class="results-container">
                <h1>Quiz Completed!</h1>
                <div class="score-display">
                    <div class="score-circle">
                        <span id="final-score"></span>%
                    </div>
                </div>
                <h2 id="result-message"></h2>
                <p id="result-details"></p>
                <div class="results-stats">
                    <div class="stat">
                        <span class="stat-label">Correct</span>
                        <span id="correct-count" class="stat-value"></span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Incorrect</span>
                        <span id="incorrect-count" class="stat-value"></span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Skipped</span>
                        <span id="skipped-count" class="stat-value"></span>
                    </div>
                </div>
                <button class="btn" onclick="retakeQuiz()">Retake Quiz</button>
                <button class="btn btn-secondary" onclick="changeDifficulty()">Change Difficulty</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
